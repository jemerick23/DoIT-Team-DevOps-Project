<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="DoIT_ForgotPassword_Screen.css">
</head>

<body>
    <canvas id="myCanvas"></canvas>
        <script src="DoIT_canvas.js"></script>

<!--Forgot password screen content-->
<div id = "Forgot-Password-screen">
    <h1>DoIT</h1>
    <h2>A Team Task and Project Collaboration Platform</h2>
    <h3>Reset password</h3>
    <!--Input fields-->
    <label>
        <input id="email" type = "email" placeholder="Enter your email">
    </label>
    <br>
    <label>
        <input id="newPassword" type = "password" placeholder="Enter your new password">
    </label>
    <br>
    <label>
        <input id="confirmPassword" type = "password" placeholder="Confirm your new password">
    </label>
    <br>
    <div class = "button-container">
    <!--Change password-->
    <button 
        id="changePasswordBtn" 
        class = "change-password-button">
        Change password
    </button>
</div>
<script type="module" src="./DoIT_ForgotPassword.js"></script>
</body>
</html>
