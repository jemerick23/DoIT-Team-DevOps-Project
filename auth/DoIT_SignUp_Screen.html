<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoIT Sign Up</title>
    <link rel="stylesheet" href="DoIT_SignUp_Screen.css">
</head>

<body>
    <canvas id="myCanvas"></canvas>
        <script src="DoIT_canvas.js"></script>

<div id = "sign-up-screen">
    <h1>DoIT</h1>
    <h2>A Team Task and Project Collaboration Platform</h2>
    <h3>Sign up to continue</h3>

    <input id="first_name" type="text" placeholder="First Name" required>
    <br>
    <input id="last_name" type="text" placeholder="Last Name" required>
    <br>
    <input id="email" type="email" placeholder="Email" required>
    <br>
    <input id="role" type="text" placeholder="Role (optional)">
    <br>
    <input id="password" type="password" placeholder="Password" required>
    <div class = "header-row">
        <div class = "remember-container">
        <input type = "checkbox" id="remember">
        <label for="remember">Remember me</label>
        </div>
        <div class = "sign-in-link">
        <label>Already have an account?</label>
        <a href = "DoIT_Login_Screen.html">Sign In</a>
        </div>
    </div>
    <br>
    <div class = "button-container">
    <button class="sign-up-button" id="signupBtn">Sign Up</button>
    </div>
    </div>
</div>

<script type="module" src="./DoIT_SignUp.js"></script>
</body>
</html>
