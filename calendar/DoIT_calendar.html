<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoIT Task Calendar</title>
  <link rel="stylesheet" href="DoIT_calendar.css">
</head>
<body>
  <!--Sidebar-->
        <div id="mySidebar" class="sidebar open">
            <div class="sidebar-header">
                <button class="openbtn" onclick="toggleSidebar()">☰</button>
                <h2>DoIT</h2>
            </div>
        
            <div class="sidebar-content">
                <p class="sidebar-section">Menu</p>
                <a href="#dashboard" class="active" onclick="window.location.href='../dashboard/DoIT_Dashboard.html'">Dashboard</a>
                <a href="#tasks" onclick="window.location.href='../tasks/DoIT_Task_Screen.html'">Tasks</a>
                <a href="#logout" onclick="window.location.href='../auth/DoIT_Login_Screen.html'">Logout</a>

                <p class="sidebar-section">Collaboration</p>
                <a href="#team-messages" onclick="window.location.href='../teams/DoIT_teamMessages.html'">✉ Team Messages</a>
                <a href="#view-team-members" onclick="window.location.href='../teams/DoIT_teamMembers.html'">👤 View Team members</a>

                <p class="sidebar-section">Support</p>
                <a href="#settings" onclick="window.location.href='../settings/DoIT_Settings.html'">⚙ Settings</a>

            </div>
        </div>
  <!--Calendar content-->
  <div class="calendar-container">
    <h1>DoIT Task Calendar</h1>
    <div class="header">
      <!--Previous and next month buttons-->
      <button id="prevMonth" type="button">◀</button>
      <div id="monthYear"></div>
      <button id="nextMonth" type="button">▶</button>
    </div>
    <!--Weekdays-->
    <div class="weekday-row">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
  <!--Task panel content-->
  <div class="task-panel" id="taskPanel">
    <h2 id="taskDateTitle"></h2>
    <ul class="task-list" id="taskList"></ul>
    <div class="task-input-row">
      <input id="taskInput" type="text" placeholder="Add a new task" />
    <!--Task buttons-->
      <button id="addTaskButton" type="button">Add</button>
    </div>
    <button class="close-button" id="closeTaskPanel" type="button">Close</button>
  </div>
<script src="../settings/theme.js"></script>
<script src="DoIT_calendar.js"></script>
<script type="module" src="../dashboard/DoIT_Dashboard.js"></script>
</body>
</html>
