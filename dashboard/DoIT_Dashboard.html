<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoIT Dashboard</title>
    <link rel="stylesheet" href="DoIT_Dashboard.css">
</head>
    <body>
        
    <!--Sidebar-->
        <div id="mySidebar" class="sidebar open">
            <div class="sidebar-header">
                <button class="openbtn" onclick="toggleSidebar()">☰</button>
                <h2>DoIT</h2>
            </div>
        
            <div class="sidebar-content">
                <p class="sidebar-section">Menu</p>
                <a href="#calendar" onclick="window.location.href='../calendar/DoIT_calendar.html'">Calendar</a>
                <a href="#tasks" onclick="window.location.href='../tasks/DoIT_Task_Screen.html'">Tasks</a>
                <a href="#logout" onclick="window.location.href='../auth/DoIT_Login_Screen.html'">Logout</a>

                <p class="sidebar-section">Collaboration</p>
                <a href="#team-messages" onclick="window.location.href='../teams/DoIT_teamMessages.html'">✉ Team Messages</a>
                <a href="#view-team-members" onclick="window.location.href='../teams/DoIT_teamMembers.html'">👤 View Team members</a>

                <p class="sidebar-section">Support</p>
                <a href="#settings" onclick="window.location.href='../settings/DoIT_Settings.html'">⚙ Settings</a>
            </div>
        </div>

    <!--Main Content-->
        <div id="main" class="main-content">
            <div class="top-header">
                <h1 class="welcome">Dashboard</h1>

                <div class="profile-header">
                    <div class = "profile-info">
                    <h1 id="userName">Welcome: </h1>
                    <p id="userOccupation" font-weight="bold">Occupation: </p>
                    </div>

                    <span class="circle-profile-picture"></span>
                </div>
            </div>

                <label>
                    <input type="search" placeholder="🔍 Type to search..." class="search-bar">
                </label>

                <div class="square-tasks">
                    <h3>Tasks</h3>
                    <div id="dashboardTaskList"></div>
                </div>

                <div class="square-roles">
                    <h3>Roles</h3>
                    <div id ="roleList"></div>
                </div>

                <div class="square-progress-and-activity">
                    <h3>Project Progress and Activity</h3>
                    <div id = "progressList"></div>
                </div>
            </div>
        </div>
        <!-- DOIT AI ASSISTANT-->

<!-- Floating Button -->
<div id="assistant-btn">💬</div>
 
<!--Chat box-->
<div id="assistant-box">
 
    <div id="assistant-header">
        DoIT Assistant
</div>
 
 
    <div id="assistant-messages">
 
        <div class="bot">
            Hey 👋 I'm your assistant. Ask me about tasks or projects.
</div>
 
    </div>
 
 
    <div id="assistant-input-area">
 
        <input 
        id="assistant-input" 
        type="text" 
        placeholder="Ask something..."
>
 
        <button id="assistant-send">
            ➤
</button>
 
    </div>
 
 
</div>
<script src="../settings/theme.js"></script>
<script type="module" src="DoIT_Dashboard.js"></script>
    </body>
</html>
