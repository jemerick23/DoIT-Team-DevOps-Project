<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoIT Dashboard</title>
    <link rel="stylesheet" href="DoIT_Settings.css">
</head>
    <body>
    <!--Sidebar-->
        <div id="mySidebar" class="sidebar open">
            <div class="sidebar-header">
                <button class="openbtn" onclick="toggleSidebar()">☰</button>
                <h2>DoIT</h2>
            </div>
        
            <div class="sidebar-content">
                <p class="sidebar-section">Menu</p>
                <a href="#dashboard" class="active" onclick="window.location.href='../dashboard/DoIT_Dashboard.html'">Dashboard</a>
                <a href="#calendar" onclick="window.location.href='../calendar/DoIT_calendar.html'">Calendar</a>
                <a href="#tasks" onclick="window.location.href='../tasks/DoIT_Task_Screen.html'">Tasks</a>
                <a href="#logout" onclick="window.location.href='../auth/DoIT_Login_Screen.html'">Logout</a>

                <p class="sidebar-section">Collaboration</p>
                <a href="#team-messages" onclick="window.location.href='../teams/DoIT_teamMessages.html'">✉ Team Messages</a>
                <a href="#view-team-members" onclick="window.location.href='../teams/DoIT_teamMembers.html'">👤 View Team members</a>

            </div>
        </div>

         <!--Main Content-->
        <div id="main" class="main-content">
            <div class="top-header">
                <h1 class="welcome">Settings</h1>

                <div class="profile-header">
                    <div class = "profile-info">
                    <h1 id="userName">Welcome: </h1>
                    <p id="userOccupation" font-weight="bold">Occupation: </p>
                    </div>

                    <span class="circle-profile-picture"></span>
                </div>
            </div>

            <div class="settings-container">
                <h2>General Settings</h2>
                <br>
                <label for="theme">Theme:</label>
                <select id="theme">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
                <br>
                <label for="notifications">Enable Notifications:</label>
                <select id="notifications">
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>
                <br>
                <br>
                <h2>Profile Settings</h2>
                <label for="first_name">First Name:</label>
                <input id="first_name" type="text" placeholder="Enter your first name">
                <br>
                <label for="last_name">Last Name:</label>
                <input id="last_name" type="text" placeholder="Enter your last name">
                <br>
                <label for="role">Occupation:</label>
                <input id="role" type="text" placeholder="Enter your occupation">
                <br>
                <h2>Privacy settings</h2>
                <input type="checkbox" id="allow-tracking" name="allow-tracking" value="allow-tracking">
                    <label for="allow-tracking">Allow tracking</label>
                <br>
                <input type="checkbox" id="data-sharing" name="data-sharing" value="data-sharing">
                <label for="data-sharing">Allow data sharing</label>
                <br>
                <br>
                <button id="saveBtn">Save Settings</button>
                <div class="message" id="message"></div>
            </div>

        <!-- DOIT AI ASSISTANT-->

        <!-- Floating Button -->
        <div id="assistant-btn">💬</div>

        <!-- Chat Box -->
        <div id="assistant-box">

            <div id="assistant-header">
                DoIT Assistant
            </div>

            <div id="assistant-messages">
                <div class="bot">Hey 👋 I’m your DoIT assistant.</div>
                <div class="bot">Ask me about tasks, roles, or progress.</div>
            </div>

            <div id="assistant-input-area">
                <input id="assistant-input" type="text" placeholder="Type a message..." />
                <button id="assistant-send">➤</button>
            </div>

        </div>

        <script src="DoIT_settings.js"></script>
        <script type="module" src="../dashboard/DoIT_Dashboard.js"></script>
    </body>
</html>
