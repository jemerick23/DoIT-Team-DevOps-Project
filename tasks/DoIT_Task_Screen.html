<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>DoIT Tasks</title>
    <link rel="stylesheet" href="DoIT_Task_Screen.css">
</head>

<body>

    <canvas id="myCanvas"></canvas>

    <!--Sidebar-->
        <div id="mySidebar" class="sidebar open">
            <div class="sidebar-header">
                <button class="openbtn" onclick="toggleSidebar()">☰</button>
                <h2>DoIT</h2>
            </div>
        
            <div class="sidebar-content">
                <p class="sidebar-section">Menu</p>
                <a href="#dashboard" class="active" onclick="window.location.href='../dashboard/DoIT_Dashboard.html'">Dashboard</a>
                <a href="#calendar" onclick="window.location.href='../calendar/DoIT_calendar.html'">Calendar</a>
                <a href="#logout" onclick="window.location.href='../auth/DoIT_Login_Screen.html'">Logout</a>

                <p class="sidebar-section">Collaboration</p>
                <a href="#team-messages" onclick="window.location.href='../teams/DoIT_teamMessages.html'">✉ Team Messages</a>
                <a href="#view-team-members" onclick="window.location.href='../teams/DoIT_teamMembers.html'">👤 View Team members</a>

                <p class="sidebar-section">Support</p>
                <a href="#settings" onclick="window.location.href='../settings/DoIT_Settings.html'">⚙ Settings</a>
            </div>
        </div>

    <!-- Task Management Dashboard -->
    <div id="task-screen">

        <h1>DoIT</h1>
        <h2>Task Management Dashboard</h2>

        <!-- Task Creation Form -->
        <div class="task-form">

            <input
                type="text"
                id="taskTitle"
                placeholder="Task Title">

            <textarea
                id="taskDescription"
                placeholder="Task Description"></textarea>

            <select id="taskPriority">
                <option value="">Select Priority</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <input
                type="date"
                id="taskDueDate">

            <button id="addTaskButton">
                Create Task
            </button>

            <p id="taskMessage"></p>

        </div>

        <!-- JE: Area where created tasks will be displayed -->
         <h3 id="currentTasksHeading">Current Tasks</h3>

         <h4 id="taskCounter">Total Tasks: 0</h4>

        <div id="taskList">

        </div>

    </div>
    <!--<script src="../settings/theme.js"></script>-->
    <!--<script type="module" src="../dashboard/DoIT_Dashboard.js"></script>-->
    <script type="module" src="./DoIT_Task_Screen.js"></script>

</body>

</html>
