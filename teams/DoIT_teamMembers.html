<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoIT Team Members</title>
    <link rel="stylesheet" href="DoIT_teamMembers.css">
</head>
    <body>
    <!--Sidebar-->
        <div id="mySidebar" class="sidebar open">
            <div class="sidebar-header">
                <button class="openbtn" onclick="toggleSidebar()">☰</button>
                <h2>DoIT</h2>
            </div>
        
            <div class="sidebar-content">
                <p class="sidebar-section">Menu</p>
                <a href="#dashboard" class="active" onclick="window.location.href='../dashboard/DoIT_Dashboard.html'">Dashboard</a>
                <a href="#calendar">Calendar</a>
                <a href="#tasks" onclick="window.location.href='../tasks/DoIT_Task_Screen.html'">Tasks</a>
                <a href="#logout" onclick="window.location.href='../auth/DoIT_Login_Screen.html'">Logout</a>

                <p class="sidebar-section">Collaboration</p>
                <a href="#team-messages" onclick="window.location.href='../teams/DoIT_teamMessages.html'">✉ Team Messages</a>

                <p class="sidebar-section">Support</p>
                <a href="#settings" onclick="window.location.href='../settings/DoIT_Settings.html'">⚙ Settings</a>

            </div>
        </div>

        <!--Main Content-->
        <div id="main" class="main-content">
            <div class="top-header">
                <h1 class="welcome">Team Members</h1>

                <div class="profile-header">
                    <div class = "profile-info">
                    <h1 class="name">Name: </h1>
                    <p class="occupation" font-weight="bold">Occupation: </p>
                    </div>

                    <span class="circle-profile-picture"></span>
                </div>
            </div>

                <div class="square-roles">
                    <h3>Team Members</h3>
                    <div id ="teamMembersList">
                    </div>
                </div>
            </div>
        </div>

        <!-- DOIT AI ASSISTANT-->

<!-- Floating Button -->
<div id="assistant-btn">💬</div>

<!-- Chat Box -->
<div id="assistant-box">

    <div id="assistant-header">
        DoIT Assistant
    </div>

    <div id="assistant-messages">
        <div class="bot">Hey 👋 I’m your DoIT assistant.</div>
        <div class="bot">Ask me about tasks, roles, or progress.</div>
    </div>

    <div id="assistant-input-area">
        <input id="assistant-input" type="text" placeholder="Type a message..." />
        <button id="assistant-send">➤</button>
    </div>

</div>

<script type="module" src="DoIT_teamMembers.js"></script>
<script type="module" src="../dashboard/DoIT_Dashboard.js"></script>
    </body>
</html>
